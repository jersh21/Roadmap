<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Yearly Roadmap</title>
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="stylesheet" href="styles.css">
    <meta name="description" content="A beautiful and dynamic yearly roadmap web application">
</head>

                <input type="color" id="text-color" class="toolbar-btn color-picker" title="Text Color" value="#4e54c8">
                <div class="harmony-palette">
                    <button id="harmony_color01" class="harmony-btn" title="Harmonious Color 1"></button>
                    <button id="harmony_color02" class="harmony-btn" title="Harmonious Color 2"></button>
                    <button id="harmony_color03" class="harmony-btn" title="Harmonious Color 3"></button>
                </div>
                <select id="font-select" class="toolbar-btn font-picker" title="Font Family">
                    <option value="" disabled selected>Font</option>
                    <option value="Inter">Inter</option>
                    <option value="Pacifico">Pacifico</option>
                    <option value="Caveat">Caveat</option>
                    <option value="Dancing Script">Dancing Script</option>
                    <option value="Arial">Arial</option>
                    <option value="Courier New">Courier</option>
                    <option value="Georgia">Georgia</option>

                    <button class="size-btn toolbar-btn" data-size="5" title="Large">L</button>
                    <button class="size-btn toolbar-btn" data-size="7" title="Extra Large">XL</button>
                </div>
            </div>

                    <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"></line>

                    <label style="display:flex; align-items:center; gap:0.5rem; cursor:pointer;"
                        id="holiday-visibility-label">
                        <input type="checkbox" id="holiday-visibility-toggle" checked>
                        Show Holidays
                    </label>
                    <select id="holiday-region-select" class="toolbar-btn font-picker"
                        style="width:100%; margin-top:0.8rem; font-family:Inter; cursor:pointer; font-size:0.9rem;">
                        <option value="US">US Holidays</option>
                        <option value="IN">India Holidays</option>
                        <option value="JP">Japan Holidays</option>
                        <option value="UK">UK Holidays</option>
                        <option value="CA">Canada Holidays</option>
                        <option value="GR">Greece Holidays</option>
                        <option value="CN">China Holidays</option>
                        <option value="DE">Germany Holidays</option>
                        <option value="CUSTOM">Custom Holidays</option>
                    </select>

                        style="width:100%; margin-top:0.5rem; display:none;">Edit Custom...</button>
                </div>

        </header>

        <div class="roadmap-wrapper">
            <svg id="car-svg"></svg>
            <svg id="road-svg">
                <!-- Defs for glow gradients -->
                <defs>
                    <linearGradient id="road-grad" x1="0%" y1="0%" x2="100%" y2="100%">
                        <stop offset="0%" stop-color="#4e54c8" />
                        <stop offset="100%" stop-color="#8f94fb" />
                    </linearGradient>
                </defs>
            </svg>
            <div class="roadmap" id="roadmap">
                <!-- month cards-->
            </div>
        </div>
    </div>

    <div id="custom-holiday-modal" class="modal-overlay hidden">
        <div class="modal">
            <h2 style="margin-bottom:0.5rem;">Custom Holidays</h2>
            <p style="opacity:0.8; font-size:0.9rem; margin-bottom:1rem;">Add your own holidays. Month and Day are exact
                numbers.</p>
            <div id="custom-holiday-list" style="margin-bottom:1rem; max-height:200px; overflow-y:auto;"></div>
            <div style="display:flex; gap:0.5rem;">
                <input type="text" id="custom-h-name" placeholder="Name (e.g. Birthday)" style="flex:2;">
                <input type="number" id="custom-h-month" placeholder="Mo (1-12)" style="flex:1;" min="1" max="12">
                <input type="number" id="custom-h-day" placeholder="Day (1-31)" style="flex:1;" min="1" max="31">
                <button id="add-custom-h-btn" class="toolbar-btn">Add</button>
            </div>
            <div style="display:flex; justify-content:flex-end; margin-top:1.5rem;">
                <button id="close-custom-modal" class="toolbar-btn">Done</button>
            </div>
        </div>
    </div>

    <script src="holidays.js"></script>
    <script src="script.js"></script>
</body>
